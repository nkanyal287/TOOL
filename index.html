<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelCraft - Online File Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [Previous CSS remains exactly the same] */
    </style>
</head>
<body>
    <!-- [Previous HTML remains exactly the same until the script section] -->

    <script>
        // [Previous JavaScript remains the same until the Image Compressor Logic]

        /* Image Compressor Logic */
        const compressDropArea = document.getElementById('compress-drop-area');
        const compressFileInput = document.getElementById('compress-file-input');
        const compressPreviewImage = document.getElementById('compress-preview-image');
        const compressBtn = document.getElementById('compress-btn');
        const compressQualityInput = document.getElementById('compress-quality');
        const compressQualityValue = document.getElementById('compress-quality-value');
        const compressResultDiv = document.getElementById('compress-result');
        const compressFileInfo = document.getElementById('compress-file-info');
        
        let compressSelectedFile = null;
        let compressedImageBlob = null;
        
        // Handle quality slider
        compressQualityInput.addEventListener('input', () => {
            compressQualityValue.textContent = `${compressQualityInput.value}%`;
        });
        
        // Handle drag and drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            compressDropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        ['dragenter', 'dragover'].forEach(eventName => {
            compressDropArea.addEventListener(eventName, highlightCompress, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            compressDropArea.addEventListener(eventName, unhighlightCompress, false);
        });
        
        function highlightCompress() {
            compressDropArea.classList.add('active');
        }
        
        function unhighlightCompress() {
            compressDropArea.classList.remove('active');
        }
        
        compressDropArea.addEventListener('drop', handleCompressDrop, false);
        compressFileInput.addEventListener('change', handleCompressFiles, false);
        
        function handleCompressDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleCompressFiles({ target: { files } });
        }
        
        function handleCompressFiles(e) {
            const files = e.target.files;
            if (files.length) {
                compressSelectedFile = files[0];
                if (compressSelectedFile.type.startsWith('image/')) {
                    compressDropArea.innerHTML = `
                        <i class="fas fa-check-circle fa-3x" style="color: var(--secondary); margin-bottom: 1rem;"></i>
                        <h3>${compressSelectedFile.name}</h3>
                        <p>${(compressSelectedFile.size / 1024 / 1024).toFixed(2)} MB</p>
                        <button class="btn" onclick="clearCompressSelection()" style="margin-top: 1rem;">
                            <i class="fas fa-times"></i> Change Image
                        </button>
                    `;
                    
                    // Show preview
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        compressPreviewImage.src = event.target.result;
                        compressPreviewImage.style.display = 'block';
                        
                        // Show file info
                        compressPreviewImage.onload = () => {
                            compressFileInfo.innerHTML = `
                                <p>Original Dimensions: ${compressPreviewImage.naturalWidth} × ${compressPreviewImage.naturalHeight} px</p>
                                <p>Original Size: ${(compressSelectedFile.size / 1024).toFixed(2)} KB</p>
                            `;
                        };
                    };
                    reader.readAsDataURL(compressSelectedFile);
                    
                    compressBtn.disabled = false;
                } else {
                    alert('Please select an image file');
                    clearCompressSelection();
                }
            }
        }
        
        function clearCompressSelection() {
            compressSelectedFile = null;
            compressedImageBlob = null;
            compressFileInput.value = '';
            compressPreviewImage.style.display = 'none';
            compressDropArea.innerHTML = `
                <i class="fas fa-image fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
                <h3>Drag & Drop Image Here</h3>
                <p>or</p>
                <button class="btn btn-primary" onclick="document.getElementById('compress-file-input').click()">
                    <i class="fas fa-folder-open"></i> Select Image
                </button>
            `;
            compressBtn.disabled = true;
            compressResultDiv.innerHTML = '';
            compressFileInfo.innerHTML = '';
        }
        
        // Image compression process
        compressBtn.addEventListener('click', () => {
            if (!compressSelectedFile) return;
            
            compressBtn.disabled = true;
            compressBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Compressing...';
            
            // Create canvas to process the image
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                // Set canvas dimensions to image dimensions
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                
                // Draw image on canvas
                ctx.drawImage(img, 0, 0);
                
                // Get quality value (convert from 1-100 to 0-1)
                const quality = compressQualityInput.value / 100;
                
                // Convert canvas to Blob with specified quality
                canvas.toBlob((blob) => {
                    compressedImageBlob = blob;
                    
                    // Calculate size reduction
                    const originalSize = compressSelectedFile.size;
                    const compressedSize = blob.size;
                    const reduction = (originalSize - compressedSize) / originalSize;
                    
                    // Show results
                    showCompressResult(blob, originalSize, compressedSize, reduction);
                    
                    compressBtn.disabled = false;
                    compressBtn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i> Compress Image';
                }, compressSelectedFile.type, quality);
            };
            
            img.src = URL.createObjectURL(compressSelectedFile);
        });
        
        function showCompressResult(blob, originalSize, compressedSize, reduction) {
            const fileName = compressSelectedFile.name.split('.')[0];
            const fileExtension = compressSelectedFile.name.split('.').pop();
            const keepMetadata = document.getElementById('keep-metadata').checked;
            
            compressResultDiv.innerHTML = `
                <div style="background: #f0fdf4; padding: 1rem; border-radius: 8px; border: 1px solid #bbf7d0;">
                    <i class="fas fa-check-circle fa-2x" style="color: var(--secondary);"></i>
                    <h3>Compression Complete!</h3>
                    <p>Original Size: ${(originalSize / 1024).toFixed(2)} KB</p>
                    <p>Compressed Size: ${(compressedSize / 1024).toFixed(2)} KB (${(reduction * 100).toFixed(0)}% reduction)</p>
                    <p>Quality: ${compressQualityInput.value}%</p>
                    <p>Metadata: ${keepMetadata ? 'Preserved' : 'Removed'}</p>
                    <div class="preview-container" style="margin: 1rem 0;">
                        <h4>Compressed Preview:</h4>
                        <img id="compressed-preview" style="max-width: 100%; max-height: 200px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                    <button class="btn btn-primary" id="compress-download-btn" style="margin-top: 1rem;">
                        <i class="fas fa-download"></i> Download ${fileName}_compressed.${fileExtension}
                    </button>
                </div>
            `;
            
            // Show compressed preview
            const compressedPreview = document.getElementById('compressed-preview');
            const url = URL.createObjectURL(blob);
            compressedPreview.src = url;
            
            // Add download functionality
            document.getElementById('compress-download-btn').addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName}_compressed.${fileExtension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }

        /* Image Resizer Logic */
        const resizeDropArea = document.getElementById('resize-drop-area');
        const resizeFileInput = document.getElementById('resize-file-input');
        const resizePreviewImage = document.getElementById('resize-preview-image');
        const resizeBtn = document.getElementById('resize-btn');
        const resizeWidthInput = document.getElementById('resize-width');
        const resizeHeightInput = document.getElementById('resize-height');
        const resizeFormatSelect = document.getElementById('resize-format');
        const resizeQualityInput = document.getElementById('resize-quality');
        const resizeQualityValue = document.getElementById('resize-quality-value');
        const resizeResultDiv = document.getElementById('resize-result');
        
        let resizeSelectedFile = null;
        let resizedImageBlob = null;
        
        // Handle quality slider
        resizeQualityInput.addEventListener('input', () => {
            resizeQualityValue.textContent = `${resizeQualityInput.value}%`;
        });
        
        // Handle drag and drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            resizeDropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        ['dragenter', 'dragover'].forEach(eventName => {
            resizeDropArea.addEventListener(eventName, highlightResize, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            resizeDropArea.addEventListener(eventName, unhighlightResize, false);
        });
        
        function highlightResize() {
            resizeDropArea.classList.add('active');
        }
        
        function unhighlightResize() {
            resizeDropArea.classList.remove('active');
        }
        
        resizeDropArea.addEventListener('drop', handleResizeDrop, false);
        resizeFileInput.addEventListener('change', handleResizeFiles, false);
        
        function handleResizeDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleResizeFiles({ target: { files } });
        }
        
        function handleResizeFiles(e) {
            const files = e.target.files;
            if (files.length) {
                resizeSelectedFile = files[0];
                if (resizeSelectedFile.type.startsWith('image/')) {
                    resizeDropArea.innerHTML = `
                        <i class="fas fa-check-circle fa-3x" style="color: var(--secondary); margin-bottom: 1rem;"></i>
                        <h3>${resizeSelectedFile.name}</h3>
                        <p>${(resizeSelectedFile.size / 1024 / 1024).toFixed(2)} MB</p>
                        <button class="btn" onclick="clearResizeSelection()" style="margin-top: 1rem;">
                            <i class="fas fa-times"></i> Change Image
                        </button>
                    `;
                    
                    // Show preview
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        resizePreviewImage.src = event.target.result;
                        resizePreviewImage.style.display = 'block';
                        
                        // Set original dimensions
                        resizePreviewImage.onload = () => {
                            resizeWidthInput.placeholder = resizePreviewImage.naturalWidth;
                            resizeHeightInput.placeholder = resizePreviewImage.naturalHeight;
                        };
                    };
                    reader.readAsDataURL(resizeSelectedFile);
                    
                    resizeBtn.disabled = false;
                } else {
                    alert('Please select an image file');
                    clearResizeSelection();
                }
            }
        }
        
        function clearResizeSelection() {
            resizeSelectedFile = null;
            resizedImageBlob = null;
            resizeFileInput.value = '';
            resizePreviewImage.style.display = 'none';
            resizeDropArea.innerHTML = `
                <i class="fas fa-image fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
                <h3>Drag & Drop Image Here</h3>
                <p>or</p>
                <button class="btn btn-primary" onclick="document.getElementById('resize-file-input').click()">
                    <i class="fas fa-folder-open"></i> Select Image
                </button>
            `;
            resizeBtn.disabled = true;
            resizeResultDiv.innerHTML = '';
            resizeWidthInput.value = '';
            resizeHeightInput.value = '';
        }
        
        // Image resizing process
        resizeBtn.addEventListener('click', () => {
            if (!resizeSelectedFile) return;
            
            resizeBtn.disabled = true;
            resizeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            // Create canvas to process the image
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                // Calculate new dimensions
                let newWidth = parseInt(resizeWidthInput.value) || img.naturalWidth;
                let newHeight = parseInt(resizeHeightInput.value) || img.naturalHeight;
                
                // Maintain aspect ratio if only one dimension is specified
                if (resizeWidthInput.value && !resizeHeightInput.value) {
                    newHeight = (newWidth / img.naturalWidth) * img.naturalHeight;
                } else if (!resizeWidthInput.value && resizeHeightInput.value) {
                    newWidth = (newHeight / img.naturalHeight) * img.naturalWidth;
                }
                
                // Set canvas dimensions
                canvas.width = newWidth;
                canvas.height = newHeight;
                
                // Draw image on canvas with new dimensions
                ctx.drawImage(img, 0, 0, newWidth, newHeight);
                
                // Determine output format
                let format = 'image/jpeg';
                if (resizeFormatSelect.value === 'png') format = 'image/png';
                if (resizeFormatSelect.value === 'webp') format = 'image/webp';
                
                // Get quality value (convert from 1-100 to 0-1)
                const quality = resizeQualityInput.value / 100;
                
                // Convert canvas to Blob with specified quality
                canvas.toBlob((blob) => {
                    resizedImageBlob = blob;
                    
                    // Show results
                    showResizeResult(blob, newWidth, newHeight);
                    
                    resizeBtn.disabled = false;
                    resizeBtn.innerHTML = '<i class="fas fa-crop-alt"></i> Resize Image';
                }, format, quality);
            };
            
            img.src = URL.createObjectURL(resizeSelectedFile);
        });
        
        function showResizeResult(blob, width, height) {
            const format = resizeFormatSelect.value === 'original' 
                ? resizeSelectedFile.name.split('.').pop() 
                : resizeFormatSelect.value;
            const quality = resizeQualityInput.value;
            const fileName = resizeSelectedFile.name.split('.')[0];
            const url = URL.createObjectURL(blob);
            
            resizeResultDiv.innerHTML = `
                <div style="background: #f0fdf4; padding: 1rem; border-radius: 8px; border: 1px solid #bbf7d0;">
                    <i class="fas fa-check-circle fa-2x" style="color: var(--secondary);"></i>
                    <h3>Resizing Complete!</h3>
                    <p>New dimensions: ${width} × ${height} px</p>
                    <p>Format: ${format.toUpperCase()}</p>
                    <p>Quality: ${quality}%</p>
                    <div class="preview-container" style="margin: 1rem 0;">
                        <h4>Resized Preview:</h4>
                        <img id="resized-preview" style="max-width: 100%; max-height: 200px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                    <button class="btn btn-primary" id="resize-download-btn" style="margin-top: 1rem;">
                        <i class="fas fa-download"></i> Download ${fileName}_resized.${format}
                    </button>
                </div>
            `;
            
            // Show resized preview
            const resizedPreview = document.getElementById('resized-preview');
            resizedPreview.src = url;
            
            // Add download functionality
            document.getElementById('resize-download-btn').addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName}_resized.${format}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }

        // [Rest of the JavaScript remains the same]
    </script>
</body>
</html>
